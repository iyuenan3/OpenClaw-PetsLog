name: PetsLog CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install --legacy-peer-deps
    
    - name: Install Playwright
      run: npx playwright install --with-deps chromium
    
    - name: Create auth directory
      run: mkdir -p tests/e2e/.auth
    
    - name: Start dev server
      run: |
        npm run dev:h5 > dev-server.log 2>&1 &
        echo "⏳ 等待开发服务器启动..."
        for i in {1..60}; do
          if curl -s http://localhost:5173 > /dev/null 2>&1; then
            echo "✅ 开发服务器已启动 (尝试 $i 次)"
            break
          fi
          if [ $i -eq 60 ]; then
            echo "❌ 开发服务器启动失败"
            cat dev-server.log
            exit 1
          fi
          sleep 2
        done
    
    - name: Run E2E tests (32 tests)
      run: npx playwright test --project=chromium --reporter=list
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: |
          test-results/
          playwright-report/
        retention-days: 7
    
    - name: Build H5
      run: npm run build:h5
    
    - name: Build 微信小程序
      run: npm run build:mp-weixin
    
    - name: Upload H5 build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: h5-build
        path: dist/build/h5
        retention-days: 5
    
    - name: Upload 小程序 build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mp-weixin-build
        path: dist/build/mp-weixin
        retention-days: 5
