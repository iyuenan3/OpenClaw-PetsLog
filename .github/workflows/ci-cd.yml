name: PetsLog CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install --legacy-peer-deps
    
    - name: Install Playwright
      run: npx playwright install --with-deps chromium
    
    - name: Start dev server
      run: |
        # 启动 H5 开发服务器，显式指定端口
        npx uni dev:h5 --port 5173 > dev-server.log 2>&1 &
        SERVER_PID=$!
        echo "Server PID: $SERVER_PID"
        
        # 等待服务器启动，最多尝试 30 次（每次 2 秒，共 60 秒）
        echo "Waiting for dev server to start..."
        for i in {1..30}; do
          if curl -s http://localhost:5173 > /dev/null 2>&1; then
            echo "✅ Dev server is ready after $((i * 2)) seconds!"
            break
          fi
          echo "Attempt $i: Server not ready yet, waiting..."
          sleep 2
        done
        
        # 最终检查
        if ! curl -s http://localhost:5173 > /dev/null 2>&1; then
          echo "❌ Dev server failed to start after 60 seconds"
          echo "=== Server log ==="
          cat dev-server.log
          exit 1
        fi
    
    - name: Run E2E tests
      run: |
        echo "Running E2E tests..."
        npx playwright test --project=chromium --reporter=list
      env:
        CI: true
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: |
          test-results/
          playwright-report/
        retention-days: 7
    
    - name: Build H5
      run: npm run build:h5
    
    - name: Build 微信小程序
      run: npm run build:mp-weixin
    
    - name: Upload H5 build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: h5-build
        path: dist/build/h5
        retention-days: 5
    
    - name: Upload 小程序 build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mp-weixin-build
        path: dist/build/mp-weixin
        retention-days: 5
