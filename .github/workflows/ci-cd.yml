name: PetsLog CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Run unit tests
      run: npm run test:unit
    
    - name: Build H5
      run: npm run build:h5
    
    - name: Build 微信小程序
      run: npm run build:mp-weixin
    
    - name: Upload H5 build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: h5-build-${{ matrix.node-version }}
        path: dist/build/h5
        retention-days: 5
    
    - name: Upload 小程序 build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mp-weixin-build-${{ matrix.node-version }}
        path: dist/build/mp-weixin
        retention-days: 5
